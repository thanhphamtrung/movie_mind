<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Movie Mind - Discovery Initial</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="./theme_1.css">
    <style>
        .mobile-container {
            width: 100%;
            max-width: 414px;
            height: 100vh;
            max-height: 896px;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
            background-color: var(--background);
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }
        @media (min-width: 415px) {
            body {
                background-color: #050505 !important;
                display: flex;
                align-items: center;
                justify-content: center;
                height: 100vh;
            }
            .mobile-container {
                height: 850px;
                border-radius: 40px;
                border: 8px solid #1f2128;
            }
        }
        
        @keyframes fade-up {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-up {
            animation: fade-up 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
        }
    </style>
</head>
<body>

<div class="mobile-container relative">
    
    <!-- Background Ambient Glows -->
    <div class="absolute top-[20%] left-[10%] w-[60%] h-[30%] bg-[#FF7EB3] opacity-10 blur-[100px] rounded-full pointer-events-none"></div>
    <div class="absolute bottom-[30%] right-[10%] w-[50%] h-[40%] bg-[#8A2BE2] opacity-15 blur-[100px] rounded-full pointer-events-none"></div>

    <!-- Header -->
    <header class="relative flex items-center justify-between p-6 z-10 shrink-0">
        <div class="w-[72px]"></div> <!-- Spacer to balance layout -->
        
        <!-- Centered Logo -->
        <div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2">
            <h1 class="brand-font text-2xl font-semibold text-gradient tracking-wide">MovieMind</h1>
        </div>

        <!-- Filter Button -->
        <button class="flex items-center gap-1.5 text-xs font-medium text-gray-300 hover:text-white bg-white/5 border border-white/10 px-3 py-1.5 rounded-full transition shrink-0 shadow-sm backdrop-blur-md">
            <i data-lucide="sliders-horizontal" class="w-3.5 h-3.5"></i> Filters
        </button>
    </header>

    <!-- Main Content Area -->
    <main class="flex-1 flex flex-col justify-center px-6 pb-12 relative z-10 overflow-y-auto no-scrollbar">
        
        <div class="flex flex-col items-center text-center animate-fade-up" style="animation-delay: 0.1s;">
            <div class="w-16 h-16 rounded-full glass-panel flex items-center justify-center mb-6 glow-shadow border border-[#FF7EB3]/30">
                <i data-lucide="sparkles" class="w-8 h-8 text-[#FF7EB3] glow-icon animate-pulse-glow"></i>
            </div>
            
            <h2 class="brand-font text-3xl font-bold text-white tracking-tight leading-tight mb-3">
                Hôm nay bạn cảm thấy thế nào?
            </h2>
            <p class="text-gray-400 text-sm font-light mb-10 max-w-[260px] leading-relaxed">
                Mô tả tâm trạng của bạn, AI sẽ gợi ý các bộ phim dành riêng cho bạn.
            </p>
        </div>

        <!-- Input Area -->
        <div class="w-full animate-fade-up" style="animation-delay: 0.2s;">
            <div class="glass-panel rounded-3xl p-3 flex flex-col border border-white/10 focus-within:border-[#8A2BE2]/50 focus-within:glow-shadow transition-all relative">
                <textarea 
                    class="w-full bg-transparent border-none outline-none text-white px-3 py-2 resize-none text-[15px] placeholder:text-gray-500 min-h-[80px]"
                    placeholder="VD: Tôi muốn xem một phim trinh thám hại não có kết thúc ấm áp..."></textarea>
                
                <div class="flex justify-between items-center mt-2 px-1">
                    <div class="flex gap-2">
                        <button class="text-gray-500 hover:text-white transition">
                            <i data-lucide="mic" class="w-5 h-5 stroke-[1.5]"></i>
                        </button>
                    </div>
                    <button class="w-10 h-10 rounded-full bg-gradient-brand text-white flex items-center justify-center hover:scale-105 active:scale-95 transition-transform glow-shadow">
                        <i data-lucide="arrow-up" class="w-5 h-5 stroke-[2.5]"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Suggestions -->
        <div class="w-full mt-10 animate-fade-up" style="animation-delay: 0.3s;">
            <p class="text-xs text-gray-500 font-medium tracking-widest uppercase mb-4 text-left ml-2">Gợi ý</p>
            <div class="flex flex-wrap gap-2.5">
                <button class="px-4 py-2.5 rounded-2xl glass-panel text-[13px] text-gray-300 hover:text-white hover:bg-white/10 border border-white/5 transition-all text-left flex items-center gap-2">
                    <span class="text-lg leading-none">🍿</span> Buổi tối ấm cúng
                </button>
                <button class="px-4 py-2.5 rounded-2xl glass-panel text-[13px] text-gray-300 hover:text-white hover:bg-white/10 border border-white/5 transition-all text-left flex items-center gap-2">
                    <span class="text-lg leading-none">🚀</span> Viễn tưởng kịch tính
                </button>
                <button class="px-4 py-2.5 rounded-2xl glass-panel text-[13px] text-gray-300 hover:text-white hover:bg-white/10 border border-white/5 transition-all text-left flex items-center gap-2">
                    <span class="text-lg leading-none">🤯</span> Hại não
                </button>
                <button class="px-4 py-2.5 rounded-2xl glass-panel text-[13px] text-gray-300 hover:text-white hover:bg-white/10 border border-white/5 transition-all text-left flex items-center gap-2">
                    <span class="text-lg leading-none">😂</span> Cười vỡ bụng
                </button>
            </div>
        </div>

    </main>

    <!-- Bottom Navigation -->
    <nav class="w-full bg-[#0B0E14]/80 backdrop-blur-2xl border-t border-white/5 flex items-center justify-around px-2 pt-4 pb-8 z-20 shrink-0 shadow-[0_-10px_40px_rgba(0,0,0,0.5)]">
        <!-- Active Tab: Discover -->
        <button class="flex flex-col items-center gap-1.5 w-[70px] text-white group">
            <i data-lucide="compass" class="w-6 h-6 stroke-[2] text-[#FF7EB3] glow-icon"></i>
            <span class="text-[10px] font-medium tracking-wide">Khám phá</span>
        </button>

        <!-- Chat -->
        <button class="flex flex-col items-center gap-1.5 w-[70px] text-gray-500 hover:text-gray-300 transition group">
            <i data-lucide="message-circle" class="w-6 h-6 stroke-[2] group-hover:scale-110 transition-transform"></i>
            <span class="text-[10px] font-medium tracking-wide">Trò chuyện</span>
        </button>

        <!-- Watchlist -->
        <button class="flex flex-col items-center gap-1.5 w-[70px] text-gray-500 hover:text-gray-300 transition group">
            <i data-lucide="bookmark" class="w-6 h-6 stroke-[2] group-hover:scale-110 transition-transform"></i>
            <span class="text-[10px] font-medium tracking-wide">Danh sách</span>
        </button>

        <!-- Profile -->
        <button class="flex flex-col items-center gap-1.5 w-[70px] text-gray-500 hover:text-gray-300 transition group">
            <i data-lucide="user" class="w-6 h-6 stroke-[2] group-hover:scale-110 transition-transform"></i>
            <span class="text-[10px] font-medium tracking-wide">Hồ sơ</span>
        </button>
    </nav>
</div>

<script>
    lucide.createIcons();
</script>
</body>
</html>
