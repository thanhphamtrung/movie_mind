<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Movie Mind - Welcome</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="./theme_1.css">
    <style>
        .mobile-container {
            width: 100%;
            max-width: 414px;
            height: 100vh;
            max-height: 896px;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
            background-color: var(--background);
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }
        @media (min-width: 415px) {
            body {
                background-color: #050505 !important;
                display: flex;
                align-items: center;
                justify-content: center;
                height: 100vh;
            }
            .mobile-container {
                height: 850px;
                border-radius: 40px;
                border: 8px solid #1f2128;
            }
        }
        
        .hero-fade {
            background: linear-gradient(to bottom, rgba(11, 14, 20, 0) 30%, rgba(11, 14, 20, 0.9) 75%, var(--background) 100%);
        }
        
        /* Subtle entrance animation */
        @keyframes fade-up {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-up {
            animation: fade-up 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
        }
    </style>
</head>
<body>

<div class="mobile-container relative justify-end">
    
    <!-- Hero Image Background -->
    <div class="absolute inset-0 w-full h-[75%] z-0">
        <!-- Sci-Fi / Cinematic abstract placeholder -->
        <img src="https://images.unsplash.com/photo-1534447677768-be436bb09401?q=80&w=1000&auto=format&fit=crop" 
             alt="Cinematic Space Background" 
             class="w-full h-full object-cover object-center opacity-70" />
        <div class="absolute inset-0 hero-fade"></div>
    </div>

    <!-- Main Content Area -->
    <main class="relative z-10 w-full px-8 pb-12 pt-20 flex flex-col items-center text-center">
        
        <div class="animate-fade-up" style="animation-delay: 0.1s;">
            <h1 class="brand-font text-5xl font-bold mb-2 tracking-tight">
                <!-- Utilizing CSS gradient class from theme_1.css -->
                <span class="text-white">Movie</span><span class="text-gradient">Mind</span>
            </h1>
        </div>
        
        <div class="animate-fade-up" style="animation-delay: 0.2s;">
            <p class="text-gray-300 text-[15px] font-medium tracking-wide mb-8">
                Khám phá phim theo tâm trạng bằng AI
            </p>
        </div>

        <div class="animate-fade-up" style="animation-delay: 0.3s;">
            <p class="text-gray-400 text-sm font-light mb-12 max-w-[220px] leading-relaxed">
                Tìm bộ phim tiếp theo dựa vào cảm xúc của bạn.
            </p>
        </div>

        <!-- Get Started Button -->
        <div class="w-full animate-fade-up" style="animation-delay: 0.4s;">
            <button class="w-full bg-gradient-brand rounded-full py-4 px-6 text-white font-semibold text-[16px] tracking-wide glow-shadow transition-transform hover:scale-[1.02] active:scale-[0.98] mb-10">
                Bắt đầu
            </button>
        </div>

        <!-- Pagination Dots -->
        <div class="flex items-center justify-center gap-2 animate-fade-up" style="animation-delay: 0.5s;">
            <div class="w-[6px] h-[6px] rounded-full bg-white opacity-100 transition-all"></div>
            <div class="w-[6px] h-[6px] rounded-full bg-white opacity-20 transition-all"></div>
            <div class="w-[6px] h-[6px] rounded-full bg-white opacity-20 transition-all"></div>
            <div class="w-[6px] h-[6px] rounded-full bg-white opacity-20 transition-all"></div>
        </div>

    </main>
</div>

<script>
    lucide.createIcons();
</script>
</body>
</html>
